<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Sistema Circular 120</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --sena-verde: #39A900;
            --sena-azul: #004884;
        }
        
        body {
            background: linear-gradient(135deg, var(--sena-verde) 0%, var(--sena-azul) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 20px;
        }
        
        .registro-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            margin: 0 auto;
        }
        
        .registro-header {
            background: linear-gradient(135deg, var(--sena-verde) 0%, #2d8500 100%);
            color: white;
            padding: 30px;
            text-align: center;
            border-radius: 20px 20px 0 0;
        }
        
        .form-control:focus {
            border-color: var(--sena-verde);
            box-shadow: 0 0 0 0.25rem rgba(57, 169, 0, 0.25);
        }
        
        .btn-registro {
            background: linear-gradient(135deg, var(--sena-verde) 0%, #2d8500 100%);
            border: none;
            color: white;
            padding: 12px;
            font-weight: 600;
        }
        
        .btn-registro:hover {
            background: linear-gradient(135deg, #2d8500 0%, var(--sena-verde) 100%);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="registro-card">
            <div class="registro-header">
                <i class="bi bi-person-plus-fill fs-1 mb-3"></i>
                <h2 class="mb-0">Crear Cuenta</h2>
                <p class="mb-0 opacity-75">Sistema Circular 120 SENA</p>
            </div>
            
            <div class="p-4">
                {% if messages %}
                    {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    {% endfor %}
                {% endif %}
                
                <form method="post" novalidate>
                    {% csrf_token %}
                    
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Nombre *</label>
                            <input type="text" name="first_name" class="form-control" 
                                   value="{{ first_name|default:'' }}" required>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label">Apellido *</label>
                            <input type="text" name="last_name" class="form-control" 
                                   value="{{ last_name|default:'' }}" required>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label">Usuario *</label>
                            <input type="text" name="username" class="form-control" 
                                   value="{{ username|default:'' }}" required>
                            <small class="text-muted">Sin espacios ni caracteres especiales</small>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label">Documento *</label>
                            <input type="text" name="documento" class="form-control" 
                                   value="{{ documento|default:'' }}" required>
                        </div>
                        
                        <div class="col-12">
                            <label class="form-label">Email Institucional *</label>
                            <input type="email" name="email" class="form-control" 
                                   value="{{ email|default:'' }}" required>
                            <small class="text-muted">Debe ser @sena.edu.co o @misena.edu.co</small>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label">Contraseña *</label>
                            <input type="password" name="password1" class="form-control" required>
                            <small class="text-muted">Mínimo 8 caracteres</small>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label">Confirmar Contraseña *</label>
                            <input type="password" name="password2" class="form-control" required>
                        </div>
                        
                        <div class="col-12">
                            <label class="form-label">Rol</label>
                            <select name="rol" class="form-select">
                                <option value="INSTRUCTOR">Instructor</option>
                                <option value="COORDINADOR">Coordinador</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-registro">
                            <i class="bi bi-check-circle me-2"></i>
                            Crear Cuenta
                        </button>
                        
                        <a href="{% url 'usuarios:login' %}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-2"></i>
                            Ya tengo cuenta
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
